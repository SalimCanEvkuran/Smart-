name: APK Derle

# Bu dosya, koda her push yaptığında (veya elle tetiklediğinde)
# GitHub'ın sunucularında otomatik olarak APK derler.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # "Actions" sekmesinden elle çalıştırma imkanı

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v3

      - name: Debug APK derle
        env:
          # Bu değer, repo ayarlarındaki "Secrets" bölümünden gelir (aşağıdaki rehbere bak)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: gradle assembleDebug --stacktrace

      - name: APK'yı yükle (indirilebilir hale getir)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
